<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – DevTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css"/>
  <link rel="stylesheet" href="/static/css/login.css"/>
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-brand">
      <div class="login-logo">⬡</div>
      <h1 class="login-title">Dev<strong>Track</strong></h1>
      <p class="login-subtitle">Sistema de gestión de tareas</p>
    </div>

    <div class="login-card">
      <h2>Iniciar sesión</h2>
      <p class="login-desc">Acceso exclusivo para administradores</p>

      {% if error %}
      <div class="alert alert-error">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="email" name="email" placeholder="admin@devtrack.io" required autocomplete="email"/>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
            <button type="button" class="toggle-password" onclick="togglePwd(this)">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Ingresar al sistema
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>

      <div class="login-hint">
        <span class="mono">admin@devtrack.io</span> / <span class="mono">Admin2024!</span>
      </div>
    </div>

    <div class="login-footer">
      DevTrack v1.0 &middot; Personal productivity system
    </div>
  </div>

  <div class="login-bg">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
  </div>

  <script>
    function togglePwd(btn) {
      const input = btn.closest('.input-wrapper').querySelector('input');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
